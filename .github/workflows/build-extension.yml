on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Ensure clean dist
      run: rm -rf dist

    - name: Build
      run: make all

    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: git-lfs-on-demand-*.vsix
